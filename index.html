<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이공집 시간표 확인용 웹</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        strong {
            position: absolute;
            left: 50%;
            transform: translate(-50%);
            font-size: 30px;
            z-index: 10;
            top: 20px;
        }
        .container {
            width: 1280px;
            height: 800px;
            display: flex;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }
        ul {
            display: flex;
            align-items: center;
            list-style: none;
            transition: transform 0.5s ease-in-out;
            height: 100%;
            /* width는 자바스크립트에서 인원수에 맞게 자동 계산됩니다 */
        }
        li {
            width: 1280px;
            height: 80%;
            flex-shrink: 0; /* 크기 고정 */
            position: relative;
            text-align: center;
        }
        li > h1 { margin-bottom: 20px; }
        li > img {
            height: 100%;
            position: absolute;
            left: 50%;
            top: 50px;
            transform: translate(-50%);
        }
        .slide {
            width: 1280px;
            height: 100px;
            position: absolute;
            top: 700px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }
        .slide > button {
            width: 120px;
            height: 60px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <section class="main">
        <strong>시간표</strong>
        <div class="container">
            <ul id="scroll">
                <li style="display: flex; align-items: center; justify-content: center;">
                    <h1>데이터 로딩 중...</h1>
                </li>
            </ul>
            <div class="slide">
                <button id="left">전</button>
                <button id="right">후</button>
            </div>
        </div>
    </section>

    <script>
        // 여기에 구글 시트에서 복사한 CSV 주소를 넣으세요
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQHS5-_79VM5jUCbZFJSQqHdC5LUgZ_D5kblc9f0W56IgRjcY895E92lTUyQ3udu_xAcmmOth0m3tGT/pub?output=csv';

        const scroll = document.getElementById("scroll");
        const leftButton = document.getElementById("left");
        const rightButton = document.getElementById("right");

        let currentIndex = 0;
        let maxIndex = 0;

        async function init() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvData = await response.text();
                
                // CSV 파싱 (줄바꿈으로 나누고 헤더 제외)
                const rows = csvData.split('\n').slice(1);
                scroll.innerHTML = ''; // 로딩 문구 제거

                const members = rows.map(row => {
                    const [name, url] = row.split(',');
                    return { name: name?.trim(), url: url?.trim() };
                }).filter(m => m.name); // 빈 줄 제거

                maxIndex = members.length - 1;
                
                // 전체 너비를 인원수에 맞게 조절 (기존 7명 고정 해제)
                scroll.style.width = `${1280 * members.length}px`;

                // HTML 요소 생성
                members.forEach((member, index) => {
                    const li = document.createElement('li');
                    li.className = `member${index + 1}`;
                    li.innerHTML = `
                        <h1>${member.name}</h1>
                        <img src="${member.url}" alt="${member.name} 시간표">
                    `;
                    scroll.appendChild(li);
                });

                updateSlide();
            } catch (error) {
                console.error("데이터 로드 실패:", error);
                scroll.innerHTML = "<li><h1>데이터를 불러오지 못했습니다.</h1></li>";
            }
        }

        function updateSlide() {
            // 1280px씩 이동하도록 수정
            scroll.style.transform = `translateX(-${currentIndex * 1280}px)`;
        }

        rightButton.addEventListener("click", () => {
            if (currentIndex < maxIndex) {
                currentIndex++;
                updateSlide();
            }
        });

        leftButton.addEventListener("click", () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateSlide();
            }
        });

        // 초기화 실행
        init();
    </script>
</body>
</html>
